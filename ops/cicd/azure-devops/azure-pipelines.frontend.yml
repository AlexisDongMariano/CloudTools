trigger:
  - main

pool:
  vmImage: "ubuntu-latest"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "18.x"
    displayName: "Use Node.js"

  - script: |
      cd frontend
      npm ci
      npm run build
    displayName: "Build frontend"

