version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cloudtools
    ports:
      - "5432:5432"
    volumes:
      - cloudtools_postgres_data:/var/lib/postgresql/data

volumes:
  cloudtools_postgres_data:
